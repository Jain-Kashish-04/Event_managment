<!DOCTYPE html>
<html>
<head>
    <title>User Cake Booking</title>
    <style>
        body {
            font-family: Arial;
        }

        .card {
            width: 60%;
            margin: 20px auto;
            padding: 20px;
            box-shadow: 0 0 10px gray;
            border-radius: 10px;
        }

        .btn {
            padding: 10px;
            background: #3c5173;
            color: white;
            border: none;
            border-radius: 5px;
        }

        .btn:hover {
            background: skyblue;
            color: black;
        }
    </style>
</head>

<body>

<h2 style="text-align:center;">🎂 Book Your Cake</h2>

<div class="card">
    <h3>CHOCOLATE CAKE</h3>
    <p>Price: ₹500</p>

    <form action="">
        <input type="hidden" name="cake" value="Chocolate Cake">
        <input type="hidden" name="price" value="500">

        Name: <input type="text" name="name" required><br><br>

        <button class="btn">Book Now</button>
    </form>
</div>

<div class="card">
    <h3>STRAWBERRY CAKE</h3>
    <p>Price: ₹600</p>

    <form action="">
        <input type="hidden" name="cake" value="Strawberry Cake">
        <input type="hidden" name="price" value="600">

        Name: <input type="text" name="name" required><br><br>

        <button class="btn">Book Now</button>
    </form>
</div>



<div class="card">
    <h3>VANILLA CAKE</h3>
    <p>Price: ₹400</p>

    <form action="">
        <input type="hidden" name="cake" value="Strawberry Cake">
        <input type="hidden" name="price" value="600">

        Name: <input type="text" name="name" required><br><br>

        <button class="btn">Book Now</button>
    </form>
</div>

<div class="card">
    <h3>BLACK FOREST</h3>
    <p>Price: ₹700</p>

    <form action="">
        <input type="hidden" name="cake" value="Strawberry Cake">
        <input type="hidden" name="price" value="600">

        Name: <input type="text" name="name" required><br><br>

        <button class="btn">Book Now</button>
    </form>
</div>

</body>
</html>
